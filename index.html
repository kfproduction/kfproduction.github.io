<!doctype html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="static/css/main.css">
    <title>О нас</title>
    <style>
        .video-preview {
            position: sticky;
            top: 20px;
        }
        .video-item {
            margin-bottom: 20px;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            transition: transform 0.3s;
            background: #000;
        }
        .video-item:hover {
            transform: scale(1.02);
        }
        .video-wrapper {
            position: relative;
            width: 100%;
            padding-bottom: 75%; /* Увеличенное соотношение сторон */
            height: 0;
        }
        .video-wrapper video,
        .video-wrapper iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }
        .video-link {
            display: block;
            position: relative;
            width: 100%;
            height: 100%;
        }
        .video-thumbnail {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .play-button {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 68px;
            height: 48px;
            background: rgba(0,0,0,0.8);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: background 0.3s;
        }
        .play-button:hover {
            background: rgba(255,0,0,0.9);
        }
        .play-button::before {
            content: '';
            width: 0;
            height: 0;
            border-left: 20px solid white;
            border-top: 12px solid transparent;
            border-bottom: 12px solid transparent;
            margin-left: 4px;
        }
        .video-title {
            padding: 10px;
            background: #f8f9fa;
            font-size: 14px;
            font-weight: 500;
        }
        .videos-sidebar {
            max-height: none;
            overflow-y: visible;
        }
    </style>
</head>
<body>
<div class="container">
    <header class="d-flex flex-wrap align-items-center justify-content-center justify-content-md-between py-3 mb-4 border-bottom">
        <div class="col-md-3 mb-2 mb-md-0">
            <a href="/" class="d-inline-flex link-body-emphasis text-decoration-none">
                <img class="header__img" src="static/img/icon.png" alt="icon">
            </a>
        </div>
        <ul class="nav col-12 col-md-auto mb-2 justify-content-center mb-md-0">
            <li><a href="index.html" class="nav-link px-2 link-secondary">Главная</a></li>
            <li><a href="we.html" class="nav-link px-2">Мы</a></li>
        </ul>
        <div class="col-md-3 text-end"></div>
    </header>

    <div class="row mt-4">
        <!-- Основной контент слева -->
        <div class="col-lg-7">
            <h1>О нас</h1>
            <ul>
                <li>Скоро здесь появится контент</li>
            </ul>
            <p>Вот наши соцсети:</p>
            <ul>
                <li><a href="https://www.youtube.com/@kf_production_23" target="_blank">https://www.youtube.com/@kf_production_23</a></li>
                <li><a href="https://t.me/kfproduction_23" target="_blank">https://t.me/kfproduction_23</a></li>
            </ul>
        </div>

        <!-- Видео справа -->
        <div class="col-lg-5">
            <div class="videos-sidebar">
                <h5 class="mb-3">Наши видео</h5>
                
                <!-- Видео 1 -->
                <div class="video-item">
                    <div class="video-wrapper">
                        <video controls preload="metadata" poster="https://img.youtube.com/vi/FPaUQbxr5l4/maxresdefault.jpg">
                            <source src="static/video/1video.mp4" type="video/mp4">
                            Ваш браузер не поддерживает видео.
                        </video>
                    </div>
                    <div class="video-title">Зона 0: Кашма (трейлер)</div>
                </div>

                <!-- Видео 2 -->
                <div class="video-item">
                    <a href="https://www.youtube.com/watch?v=VIDEO_ID_2" target="_blank" class="video-link">
                        <img class="video-thumbnail" src="https://img.youtube.com/vi/VIDEO_ID_2/maxresdefault.jpg" alt="Название видео 2">
                        <div class="play-button"></div>
                    </a>
                    <div class="video-title">Название видео 2</div>
                </div>

                <!-- Видео 3 -->
                <div class="video-item">
                    <a href="https://www.youtube.com/watch?v=VIDEO_ID_3" target="_blank" class="video-link">
                        <img class="video-thumbnail" src="https://img.youtube.com/vi/VIDEO_ID_3/maxresdefault.jpg" alt="Название видео 3">
                        <div class="play-button"></div>
                    </a>
                    <div class="video-title">Название видео 3</div>
                </div>

                <!-- Видео 4 -->
                <div class="video-item">
                    <a href="https://www.youtube.com/watch?v=VIDEO_ID_4" target="_blank" class="video-link">
                        <img class="video-thumbnail" src="https://img.youtube.com/vi/VIDEO_ID_4/maxresdefault.jpg" alt="Название видео 4">
                        <div class="play-button"></div>
                    </a>
                    <div class="video-title">Название видео 4</div>
                </div>

                <!-- Видео 5 -->
                <div class="video-item">
                    <a href="https://www.youtube.com/watch?v=VIDEO_ID_5" target="_blank" class="video-link">
                        <img class="video-thumbnail" src="https://img.youtube.com/vi/VIDEO_ID_5/maxresdefault.jpg" alt="Название видео 5">
                        <div class="play-button"></div>
                    </a>
                    <div class="video-title">Название видео 5</div>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
